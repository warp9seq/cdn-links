name: Count Wasabi Downloads
on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

jobs:
  count-downloads:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Install AWS CLI
        run: pip install awscli
      - name: get counts
        run: ./getcounts.sh


